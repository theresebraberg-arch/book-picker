<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Book Picker</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container">

  <div id="startScreen">
    <h1>✨ Vad ska du läsa ikväll? ✨</h1>
    <button onclick="startGame()">Starta ✨</button>
  </div>

  <div id="quizScreen" class="hidden">
    <div id="questionArea"></div>
  </div>

  <div id="resultScreen" class="hidden">
    <h2 id="bookTitle"></h2>
    <p id="bookAuthor"></p>
    <p id="bookVibe"></p>
    <p id="bookRitual"></p>

    <button onclick="playAgain()">Kör igen</button>
    <button onclick="showAnother()">En till</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
